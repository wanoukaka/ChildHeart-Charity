<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家校联动 · 童心惠民</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <span class="topbar-logo">🌈</span>
    <span class="topbar-title">童心惠民</span>
    <nav class="topbar-nav">
      <a href="dashboard.html" class="nav-link">📊 数据看板</a>
      <a href="bookings.html" class="nav-link">📋 预约管理</a>
      <a href="cases.html" class="nav-link">🗂 个案登记</a>
      <a href="crisis.html" class="nav-link">🚨 危机干预</a>
      <a href="followup.html" class="nav-link">🔔 随访追踪</a>
      <a href="volunteers.html" class="nav-link">🤝 志愿者</a>
      <a href="family.html" class="nav-link active">🏠 家校联动</a>
    </nav>
  </div>
  <div class="topbar-right">
    <span class="topbar-user">管理员</span>
    <button class="logout-btn" onclick="logout()">退出</button>
  </div>
</header>

<main class="page-wrapper">
  <div class="page-title">🏠 家校联动</div>

  <!-- 统计卡片 -->
  <div class="stats-grid" style="margin-bottom:20px;">
    <div class="stat-card">
      <div class="stat-num" id="statTotal">-</div>
      <div class="stat-label">沟通总次数</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statParent">-</div>
      <div class="stat-label">家长沟通</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statSchool">-</div>
      <div class="stat-label">学校沟通</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statMonth">-</div>
      <div class="stat-label">本月沟通</div>
    </div>
  </div>

  <div class="table-card">
    <div class="table-toolbar">
      <h3>家校沟通记录</h3>
      <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
        <select class="form-select" id="filterType" onchange="loadFamily()">
          <option value="">全部类型</option>
          <option value="家长沟通">家长沟通</option>
          <option value="学校沟通">学校沟通</option>
          <option value="家长会">家长会</option>
          <option value="家访">家访</option>
          <option value="电话联系">电话联系</option>
          <option value="线上沟通">线上沟通</option>
          <option value="其他">其他</option>
        </select>
        <button class="btn btn-primary" onclick="openAddModal()">+ 新建记录</button>
        <button class="btn btn-outline" onclick="exportFamily()">📥 导出</button>
      </div>
    </div>

    <div id="familyTable">
      <div class="loading-mask"><div class="spinner"></div>加载中...</div>
    </div>
  </div>
</main>

<!-- 新增/编辑模态框 -->
<div class="modal-overlay" id="familyModal">
  <div class="modal" style="max-width:620px;">
    <div class="modal-header">
      <div class="modal-title" id="familyModalTitle">新建沟通记录</div>
      <button class="modal-close" onclick="closeModal('familyModal')">×</button>
    </div>
    <div style="padding:0 24px 24px;">
      <div class="form-row">
        <div class="form-group full">
          <label class="form-label">关联个案 <span style="color:var(--danger)">*</span></label>
          <select class="form-select" id="fCaseId">
            <option value="">— 选择个案 —</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">沟通日期 <span style="color:var(--danger)">*</span></label>
          <input type="date" class="form-input" id="fCommDate">
        </div>
        <div class="form-group">
          <label class="form-label">沟通类型</label>
          <select class="form-select" id="fCommType">
            <option value="家长沟通">家长沟通</option>
            <option value="学校沟通">学校沟通</option>
            <option value="家长会">家长会</option>
            <option value="家访">家访</option>
            <option value="电话联系">电话联系</option>
            <option value="线上沟通">线上沟通</option>
            <option value="其他">其他</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group full">
          <label class="form-label">沟通摘要 <span style="color:var(--danger)">*</span></label>
          <textarea class="form-textarea" id="fSummary" style="min-height:100px;" placeholder="本次沟通的主要内容（去标识化处理，不含真实姓名）..."></textarea>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group full">
          <label class="form-label">指导意见</label>
          <textarea class="form-textarea" id="fAdvice" style="min-height:80px;" placeholder="给予家庭/学校的专业建议..."></textarea>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group full">
          <label class="form-label">下次跟进</label>
          <input type="text" class="form-input" id="fNextFollowup" placeholder="如：2周后电话回访、期末家长会后约谈...">
        </div>
      </div>
      <div class="modal-footer" style="padding:0; margin-top:8px;">
        <button class="btn btn-outline" onclick="closeModal('familyModal')">取消</button>
        <button class="btn btn-primary" onclick="saveFamily()">保存</button>
      </div>
    </div>
  </div>
</div>

<!-- 查看详情模态框 -->
<div class="modal-overlay" id="viewModal">
  <div class="modal" style="max-width:620px;">
    <div class="modal-header">
      <div class="modal-title">沟通详情</div>
      <button class="modal-close" onclick="closeModal('viewModal')">×</button>
    </div>
    <div style="padding:0 24px 24px;">
      <div id="viewContent"></div>
      <div class="modal-footer" style="padding:0; margin-top:16px;">
        <button class="btn btn-outline" onclick="closeModal('viewModal')">关闭</button>
        <button class="btn btn-primary" id="editFromViewBtn" onclick="editFromView()">编辑</button>
      </div>
    </div>
  </div>
</div>

<style>
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.stat-card { background: #fff; border-radius: var(--radius-lg); padding: 20px 24px; box-shadow: var(--shadow-sm); }
.stat-num { font-size: 28px; font-weight: 700; color: var(--primary); }
.stat-label { font-size: 13px; color: var(--gray-500); margin-top: 4px; }
.loading-mask { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 40px; color: var(--gray-500); }
.spinner { width: 20px; height: 20px; border: 2px solid var(--gray-200); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.page-wrapper { padding: 24px; max-width: 1200px; margin: 0 auto; }
.page-title { font-size: 20px; font-weight: 700; color: var(--gray-900); margin-bottom: 20px; }
.table-card { background: #fff; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); overflow: hidden; }
.table-toolbar { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--gray-100); flex-wrap: wrap; gap: 12px; }
.table-toolbar h3 { font-size: 15px; font-weight: 600; color: var(--gray-700); }
.table-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead { background: var(--gray-50); }
th { padding: 10px 16px; text-align: left; font-size: 12px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
td { padding: 12px 16px; font-size: 14px; color: var(--gray-700); border-bottom: 1px solid var(--gray-100); vertical-align: top; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--gray-50); }
.empty-state { text-align: center; padding: 60px 20px; color: var(--gray-500); }
.form-select, .form-input, .form-textarea { padding: 9px 12px; border: 1.5px solid var(--gray-200); border-radius: var(--radius); font-size: 14px; width: 100%; }
.form-select:focus, .form-input:focus, .form-textarea:focus { outline: none; border-color: var(--primary); }
.modal-overlay { display: none; align-items: center; justify-content: center; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; }
.modal-overlay.show { display: flex; }
.modal { background: #fff; border-radius: var(--radius-lg); width: 90%; max-width: 480px; box-shadow: var(--shadow-lg); }
.modal-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; border-bottom: 1px solid var(--gray-100); }
.modal-title { font-size: 17px; font-weight: 700; }
.modal-close { width: 32px; height: 32px; border: none; background: none; font-size: 22px; cursor: pointer; border-radius: 6px; color: var(--gray-500); display: flex; align-items: center; justify-content: center; }
.modal-close:hover { background: var(--gray-200); }
.modal-footer { display: flex; justify-content: flex-end; gap: 10px; padding-top: 8px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group.full { grid-column: 1 / -1; }
.form-label { font-size: 13px; font-weight: 600; color: var(--gray-700); }
.form-textarea { resize: vertical; min-height: 80px; }
.btn { padding: 9px 16px; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; display: inline-flex; align-items: center; gap: 5px; }
.btn:hover { opacity: 0.9; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-outline { background: #fff; border: 1.5px solid var(--gray-200); color: var(--gray-700); }
.btn-success { background: var(--success); color: #fff; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.badge { padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; white-space: nowrap; }
.td-actions { display: flex; gap: 6px; align-items: center; white-space: nowrap; }
.comm-summary { background: var(--gray-50); border-radius: 8px; padding: 12px 16px; margin-bottom: 12px; font-size: 14px; }
.comm-field { margin-bottom: 12px; }
.comm-field-label { font-size: 12px; font-weight: 600; color: var(--gray-500); margin-bottom: 4px; }
.comm-field-value { font-size: 14px; color: var(--gray-700); white-space: pre-wrap; }
</style>

<script src="js/api.js"></script>
<script>
let currentEditId = null;
let currentViewId = null;
let casesMap = {};
let allData = [];

document.addEventListener('DOMContentLoaded', () => {
  if (!checkAuth()) return;
  loadCases();
  loadFamily();
});

async function loadCases() {
  try {
    const res = await apiGet('/api/cases');
    const cases = (res.data || []).slice(0, 200);
    casesMap = {};
    cases.forEach(c => { casesMap[c.id] = c; });

    const select = document.getElementById('fCaseId');
    cases.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = `${c.case_no} · ${c.child_name || '未知'}`;
      select.appendChild(opt);
    });
  } catch (e) {}
}

async function loadFamily() {
  const type = document.getElementById('filterType').value;
  let url = '/api/admin/family?';
  if (type) url += `comm_type=${encodeURIComponent(type)}&`;

  try {
    const res = await apiGet(url);
    allData = res.data || [];
    renderFamily(allData);
    updateStats(allData);
  } catch (e) {
    showToast('加载失败', 'error');
  }
}

function updateStats(data) {
  const total = data.length;
  const parent = data.filter(d => d.comm_type === '家长沟通').length;
  const school = data.filter(d => d.comm_type === '学校沟通').length;
  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
  const month = data.filter(d => d.comm_date >= monthStart).length;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statParent').textContent = parent;
  document.getElementById('statSchool').textContent = school;
  document.getElementById('statMonth').textContent = month;
}

function renderFamily(data) {
  const container = document.getElementById('familyTable');
  if (!data.length) {
    container.innerHTML = '<div class="empty-state">暂无沟通记录</div>';
    return;
  }

  const rows = data.map(d => `<tr>
    <td>${d.case_no || '-'}</td>
    <td>${d.case_child_name ? d.case_child_name.charAt(0)+'某' : '-'}</td>
    <td>${d.comm_type || '-'}</td>
    <td>${d.comm_date || '-'}</td>
    <td>${(d.summary || '').substring(0, 60)}${(d.summary || '').length > 60 ? '...' : ''}</td>
    <td>${d.next_followup || '-'}</td>
    <td class="td-actions">
      <button class="btn btn-outline btn-sm" onclick="viewDetail(${d.id})">查看</button>
      <button class="btn btn-outline btn-sm" onclick="openEditModal(${d.id})">编辑</button>
      <button class="btn btn-danger btn-sm" onclick="deleteFamily(${d.id})">删除</button>
    </td>
  </tr>`).join('');

  container.innerHTML = `<div class="table-scroll"><table>
    <thead><tr><th>案号</th><th>儿童姓名</th><th>沟通类型</th><th>沟通日期</th><th>沟通摘要</th><th>下次跟进</th><th>操作</th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

// ── 查看详情 ──
async function viewDetail(id) {
  try {
    const res = await apiGet(`/api/admin/family/${id}`);
    const d = res.data;
    currentViewId = id;
    const c = casesMap[d.case_id] || {};
    const content = document.getElementById('viewContent');
    content.innerHTML = `
      <div class="comm-summary">
        <strong>个案：${c.child_name ? c.child_name.charAt(0)+'某' : '-'}</strong>（${d.case_no || ''}）&nbsp;&nbsp;${d.comm_type || ''}&nbsp;&nbsp;${d.comm_date || ''}
      </div>
      <div class="comm-field"><div class="comm-field-label">沟通摘要</div><div class="comm-field-value">${d.summary || '-'}</div></div>
      <div class="comm-field"><div class="comm-field-label">指导意见</div><div class="comm-field-value">${d.advice || '-'}</div></div>
      <div class="comm-field"><div class="comm-field-label">下次跟进</div><div class="comm-field-value">${d.next_followup || '-'}</div></div>
    `;
    openModal('viewModal');
  } catch (e) {
    showToast('加载失败', 'error');
  }
}

function editFromView() {
  closeModal('viewModal');
  openEditModal(currentViewId);
}

// ── 新增/编辑 ──
function openAddModal() {
  currentEditId = null;
  document.getElementById('familyModalTitle').textContent = '新建沟通记录';
  document.getElementById('fCaseId').value = '';
  document.getElementById('fCommDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('fCommType').value = '家长沟通';
  document.getElementById('fSummary').value = '';
  document.getElementById('fAdvice').value = '';
  document.getElementById('fNextFollowup').value = '';
  openModal('familyModal');
}

async function openEditModal(id) {
  try {
    const res = await apiGet(`/api/admin/family/${id}`);
    const d = res.data;
    currentEditId = id;
    document.getElementById('familyModalTitle').textContent = '编辑沟通记录';
    document.getElementById('fCaseId').value = d.case_id || '';
    document.getElementById('fCommDate').value = d.comm_date || '';
    document.getElementById('fCommType').value = d.comm_type || '家长沟通';
    document.getElementById('fSummary').value = d.summary || '';
    document.getElementById('fAdvice').value = d.advice || '';
    document.getElementById('fNextFollowup').value = d.next_followup || '';
    openModal('familyModal');
  } catch (e) {
    showToast('加载失败', 'error');
  }
}

async function saveFamily() {
  const body = {
    case_id: parseInt(document.getElementById('fCaseId').value),
    comm_date: document.getElementById('fCommDate').value,
    comm_type: document.getElementById('fCommType').value,
    summary: document.getElementById('fSummary').value.trim(),
    advice: document.getElementById('fAdvice').value.trim(),
    next_followup: document.getElementById('fNextFollowup').value.trim(),
  };
  if (!body.case_id) { showToast('请选择关联个案', 'error'); return; }
  if (!body.comm_date) { showToast('请选择沟通日期', 'error'); return; }
  if (!body.summary) { showToast('请填写沟通摘要', 'error'); return; }

  try {
    if (currentEditId) {
      await apiPatch(`/api/admin/family/${currentEditId}`, body);
      showToast('已更新', 'success');
    } else {
      await apiPost('/api/admin/family', body);
      showToast('记录已添加', 'success');
    }
    closeModal('familyModal');
    loadFamily();
  } catch (e) {
    showToast('保存失败', 'error');
  }
}

async function deleteFamily(id) {
  if (!confirm('确定删除该沟通记录？')) return;
  try {
    await apiDelete(`/api/admin/family/${id}`);
    showToast('已删除', 'success');
    loadFamily();
  } catch (e) {
    showToast('删除失败', 'error');
  }
}

// ── 导出 CSV ──
function exportFamily() {
  if (!allData.length) { showToast('无数据可导出', 'error'); return; }
  const headers = ['案号', '个案姓名', '沟通类型', '沟通日期', '沟通摘要', '指导意见', '下次跟进'];
  const rows = allData.map(d => [
    d.case_no || '',
    d.case_child_name || '',
    d.comm_type || '',
    d.comm_date || '',
    (d.summary || '').replace(/"/g, '""'),
    (d.advice || '').replace(/"/g, '""'),
    d.next_followup || '',
  ]);
  const csv = [headers, ...rows].map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `家校联动_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('导出成功', 'success');
}

// ── 工具 ──
function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
function logout() { sessionStorage.removeItem('admin_logged_in'); window.location.href = 'index.html'; }
</script>
</body>
</html>
