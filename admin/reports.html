<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>报告生成 · 童心惠民</title>
  <link rel="stylesheet" href="css/admin.css">
  <style>
    @media print {
      .no-print { display: none !important; }
      body { background: white; }
      .page-wrapper { padding: 0; max-width: 100%; }
      .report-section { page-break-inside: avoid; }
    }
    .report-preview { background: white; border-radius: var(--radius-lg); padding: 40px 50px; box-shadow: var(--shadow); margin-top: 20px; }
    .report-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 32px; padding-bottom: 20px; border-bottom: 2px solid var(--primary); }
    .report-meta-item { display: flex; flex-direction: column; gap: 2px; }
    .report-meta-label { font-size: 12px; color: var(--gray-500); font-weight: 600; }
    .report-meta-value { font-size: 14px; color: var(--gray-900); font-weight: 600; }
    .report-section { margin-bottom: 28px; }
    .report-section-title { font-size: 16px; font-weight: 700; color: var(--primary); margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--gray-200); }
    .report-section p { font-size: 14px; color: var(--gray-700); line-height: 1.8; margin-bottom: 10px; }
    .report-section ul { padding-left: 20px; }
    .report-section li { font-size: 14px; color: var(--gray-700); line-height: 1.8; margin-bottom: 4px; }
    .report-table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13px; }
    .report-table th { background: var(--primary-light); color: var(--primary-dark); padding: 8px 12px; text-align: left; font-weight: 600; border-bottom: 2px solid var(--primary); }
    .report-table td { padding: 8px 12px; border-bottom: 1px solid var(--gray-200); vertical-align: top; }
    .report-table tr:nth-child(even) td { background: var(--gray-50); }
    .case-card { background: var(--gray-50); border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; }
    .case-card-title { font-weight: 600; font-size: 14px; color: var(--gray-900); margin-bottom: 4px; }
    .case-card-desc { font-size: 13px; color: var(--gray-600); }
    .report-cover { text-align: center; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 3px double var(--primary); }
    .report-cover-title { font-size: 24px; font-weight: 700; color: var(--primary-dark); margin-bottom: 8px; }
    .report-cover-org { font-size: 14px; color: var(--gray-500); margin-bottom: 16px; }
    .report-cover-date { font-size: 13px; color: var(--gray-500); }
    .stat-box { display: inline-block; background: var(--primary-light); border-radius: 8px; padding: 12px 20px; text-align: center; margin: 4px; }
    .stat-box-num { font-size: 24px; font-weight: 700; color: var(--primary); }
    .stat-box-label { font-size: 12px; color: var(--gray-600); }
    .print-actions { background: white; border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-sm); margin-bottom: 0; }
    .config-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .config-item { display: flex; flex-direction: column; gap: 5px; }
    .form-select, .form-input { padding: 9px 12px; border: 1.5px solid var(--gray-200); border-radius: var(--radius); font-size: 14px; width: 100%; }
    .form-select:focus, .form-input:focus { outline: none; border-color: var(--primary); }
    .form-label { font-size: 13px; font-weight: 600; color: var(--gray-700); }
    .btn { padding: 9px 16px; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; display: inline-flex; align-items: center; gap: 5px; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-outline { background: #fff; border: 1.5px solid var(--gray-200); color: var(--gray-700); }
    .btn:hover { opacity: 0.9; }
    .page-wrapper { padding: 24px; max-width: 900px; margin: 0 auto; }
    .page-title { font-size: 20px; font-weight: 700; color: var(--gray-900); margin-bottom: 16px; }
    .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; z-index: 200; flex-direction: column; gap: 12px; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--gray-200); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header class="topbar no-print">
  <div class="topbar-left">
    <span class="topbar-logo">🌈</span>
    <span class="topbar-title">童心惠民</span>
    <nav class="topbar-nav">
      <a href="dashboard.html" class="nav-link">📊 数据看板</a>
      <a href="bookings.html" class="nav-link">📋 预约管理</a>
      <a href="cases.html" class="nav-link">🗂 个案登记</a>
      <a href="crisis.html" class="nav-link">🚨 危机干预</a>
      <a href="followup.html" class="nav-link">🔔 随访追踪</a>
      <a href="volunteers.html" class="nav-link">🤝 志愿者</a>
      <a href="family.html" class="nav-link">🏠 家校联动</a>
      <a href="reports.html" class="nav-link active">📄 报告生成</a>
    </nav>
  </div>
  <div class="topbar-right">
    <span class="topbar-user">管理员</span>
    <button class="logout-btn" onclick="logout()">退出</button>
  </div>
</header>

<main class="page-wrapper no-print">
  <div class="page-title">📄 参政议政报告生成</div>

  <div class="print-actions">
    <div style="font-size:14px; color:var(--gray-600); margin-bottom:16px;">
      按照农工党参政议政报告体例，生成去标识化的工作报告。<strong>生成后请使用浏览器 Ctrl+P（或 ⌘P）导出 PDF。</strong>
    </div>
    <div class="config-grid">
      <div class="config-item">
        <label class="form-label">报告标题</label>
        <input type="text" class="form-input" id="rTitle" value="童心惠民儿童心理健康关爱行动工作汇报">
      </div>
      <div class="config-item">
        <label class="form-label">统计周期起</label>
        <input type="date" class="form-input" id="rDateStart" value="">
      </div>
      <div class="config-item">
        <label class="form-label">统计周期止</label>
        <input type="date" class="form-input" id="rDateEnd" value="">
      </div>
    </div>
    <div class="config-grid" style="grid-template-columns: 1fr 1fr;">
      <div class="config-item">
        <label class="form-label">报告类型</label>
        <select class="form-select" id="rType" onchange="toggleCrisis()">
          <option value="quarterly">季度工作报告</option>
          <option value="annual">年度工作报告</option>
          <option value="survey">专项调研报告</option>
          <option value="crisis">危机干预专项报告</option>
        </select>
      </div>
      <div class="config-item" style="display:flex; align-items:flex-end; gap:8px;">
        <button class="btn btn-primary" onclick="generateReport()" id="genBtn">🔍 生成报告</button>
        <button class="btn btn-outline" onclick="window.print()">🖨 打印/导出PDF</button>
      </div>
    </div>
  </div>
</main>

<main class="page-wrapper">
  <div class="report-preview" id="reportContent">
    <div id="reportInner"></div>
  </div>
</main>

<div class="loading-overlay" id="loadingOverlay" style="display:none;">
  <div class="spinner"></div>
  <div style="font-size:14px; color:var(--gray-600);">正在生成报告...</div>
</div>

<script src="js/api.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (!checkAuth()) return;
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('rDateEnd').value = today;
  const startOfMonth = new Date();
  startOfMonth.setDate(1);
  document.getElementById('rDateStart').value = startOfMonth.toISOString().split('T')[0];
});

function toggleCrisis() {
  // crisis type can focus on crisis module
}

async function generateReport() {
  const title = document.getElementById('rTitle').value.trim();
  const dateStart = document.getElementById('rDateStart').value;
  const dateEnd = document.getElementById('rDateEnd').value;
  const type = document.getElementById('rType').value;

  if (!dateStart || !dateEnd) { alert('请选择统计周期'); return; }

  document.getElementById('loadingOverlay').style.display = 'flex';

  try {
    const [casesRes, bookingsRes, followupRes, crisisRes, familyRes, volunteersRes] = await Promise.all([
      apiGet('/api/cases'),
      apiGet('/api/admin/bookings'),
      apiGet('/api/admin/followup'),
      apiGet('/api/admin/crisis'),
      apiGet('/api/admin/family'),
      apiGet('/api/admin/volunteers'),
    ]);

    const cases = (casesRes.data || []).filter(c => !dateStart || !c.created_at || c.created_at >= dateStart);
    const bookings = (bookingsRes.data || []).filter(b => !dateStart || !b.created_at || b.created_at >= dateStart);
    const followups = (followupRes.data || []).filter(f => !dateStart || !f.planned_date || f.planned_date >= dateStart);
    const crises = (crisisRes.data || []).filter(c => !dateStart || !c.created_at || c.created_at >= dateStart);
    const families = (familyRes.data || []).filter(f => !dateStart || !f.comm_date || f.comm_date >= dateStart);
    const volunteers = volunteersRes.data || [];

    const completedFollowups = followups.filter(f => f.status === 'completed');
    const totalHours = volunteers.reduce((s, v) => s + (parseFloat(v.total_hours) || 0), 0);
    const totalServices = volunteers.reduce((s, v) => s + (parseInt(v.service_count) || 0), 0);

    const reportDate = new Date().toLocaleDateString('zh-CN');
    const periodStr = `${dateStart} 至 ${dateEnd}`;

    // 按问题类型统计
    const issueStats = {};
    cases.forEach(c => {
      const type = c.issue_type || '其他';
      issueStats[type] = (issueStats[type] || 0) + 1;
    });

    // 年龄分布
    const ageGroups = { '0-3岁': 0, '4-6岁': 0, '7-12岁': 0, '13-15岁': 0, '16-18岁': 0 };
    cases.forEach(c => {
      const age = parseInt(c.child_age);
      if (!age) return;
      if (age <= 3) ageGroups['0-3岁']++;
      else if (age <= 6) ageGroups['4-6岁']++;
      else if (age <= 12) ageGroups['7-12岁']++;
      else if (age <= 15) ageGroups['13-15岁']++;
      else ageGroups['16-18岁']++;
    });

    // 危机分析
    const crisisByLevel = { urgent: 0, high: 0, medium: 0, low: 0 };
    crises.forEach(c => { crisisByLevel[c.crisis_level] = (crisisByLevel[c.crisis_level] || 0) + 1; });

    // 典型案例（去标识化，取最近3个）
    const recentCases = cases.slice(0, 3).map(c => ({
      case_no: c.case_no,
      age: c.child_age || '-',
      gender: c.child_gender === '男' ? '男童' : c.child_gender === '女' ? '女童' : '儿童',
      issue: c.issue_type || '其他问题',
      risk: c.risk_level || '一般',
      school: c.school || '-',
    }));

    const issueRows = Object.entries(issueStats).map(([type, count]) =>
      `<tr><td>${type}</td><td>${count}例</td><td>${((count / cases.length) * 100).toFixed(1)}%</td></tr>`
    ).join('');

    const ageRows = Object.entries(ageGroups).filter(([,v]) => v > 0).map(([g, v]) =>
      `<tr><td>${g}</td><td>${v}例</td><td>${((v / cases.length) * 100).toFixed(1)}%</td></tr>`
    ).join('');

    const caseCards = recentCases.map(c => `
      <div class="case-card">
        <div class="case-card-title">案号：${c.case_no} | ${c.gender}，约${c.age}岁 | 风险等级：${c.risk}</div>
        <div class="case-card-desc">主要问题：${c.issue} | 学校：${c.school}</div>
      </div>`).join('');

    const reportHTML = `
      <div class="report-cover">
        <div class="report-cover-org">中国农工民主党 × 童心惠民项目组</div>
        <div class="report-cover-title">${title}</div>
        <div class="report-cover-date">报告期：${periodStr} | 生成日期：${reportDate}</div>
      </div>

      <div class="report-section">
        <div class="report-section-title">一、基本情况</div>
        <p>在中共济南市委统战部的指导下，农工党济南市委联合童心惠民项目组，依托济南市未成年人心理援助中心（400-161-6985热线）及合作学校、社区服务点，持续开展儿童心理健康关爱行动。本报告汇总${periodStr}期间的工作数据。</p>
        <div style="margin-top:12px;">
          <span class="stat-box"><div class="stat-box-num">${cases.length}</div><div class="stat-box-label">新增个案</div></span>
          <span class="stat-box"><div class="stat-box-num">${bookings.length}</div><div class="stat-box-label">预约咨询</div></span>
          <span class="stat-box"><div class="stat-box-num">${completedFollowups.length}</div><div class="stat-box-label">完成随访</div></span>
          <span class="stat-box"><div class="stat-box-num">${crises.length}</div><div class="stat-box-label">危机干预</div></span>
          <span class="stat-box"><div class="stat-box-num">${families.length}</div><div class="stat-box-label">家校联动</div></span>
          <span class="stat-box"><div class="stat-box-num">${volunteers.length}</div><div class="stat-box-label">志愿者</div></span>
          <span class="stat-box"><div class="stat-box-num">${totalHours.toFixed(0)}h</div><div class="stat-box-label">志愿服务时长</div></span>
          <span class="stat-box"><div class="stat-box-num">${totalServices}</div><div class="stat-box-label">服务次数</div></span>
        </div>
      </div>

      <div class="report-section">
        <div class="report-section-title">二、调研数据</div>
        <p><strong>（一）服务画像</strong></p>
        <p>累计服务未成年人个案${cases.length}例，其中男孩${cases.filter(c=>c.child_gender==='男').length}例，女孩${cases.filter(c=>c.child_gender==='女').length}例。</p>
        <p><strong>（二）年龄分布</strong></p>
        ${ageRows ? `<table class="report-table"><thead><tr><th>年龄组</th><th>例数</th><th>占比</th></tr></thead><tbody>${ageRows}</tbody></table>` : '<p>数据不足</p>'}
        <p><strong>（三）问题类型分布</strong></p>
        ${issueRows ? `<table class="report-table"><thead><tr><th>问题类型</th><th>例数</th><th>占比</th></tr></thead><tbody>${issueRows}</tbody></table>` : '<p>数据不足</p>'}
        <p><strong>（四）典型案例（去标识化）</strong></p>
        ${caseCards || '<p>暂无典型案例</p>'}
        <p><strong>（五）危机干预情况</strong></p>
        <p>本周期内共识别并介入危机个案${crises.length}例，其中${crisisByLevel.urgent || 0}例为紧急危机、${crisisByLevel.high || 0}例为高度危机。所有危机个案均已建立干预档案并持续跟进。</p>
      </div>

      <div class="report-section">
        <div class="report-section-title">三、问题分析</div>
        <p>基于本期数据，团队梳理出以下主要困境：</p>
        <ul>
          <li><strong>专业力量不足：</strong>心理援助需求持续增长，现有专业咨询师数量难以完全满足预约需求，高峰期等待时间偏长。</li>
          <li><strong>家庭参与度差异：</strong>部分家庭对心理问题的认知仍存在误区，主动求助意愿不强，导致个案脱落率偏高。</li>
          <li><strong>学校心理师资薄弱：</strong>部分合作学校专职心理教师配置不足，心理筛查和早期预警机制尚待完善。</li>
          <li><strong>危机预警响应速度：</strong>线上预约到线下干预的衔接流程可进一步优化，危机个案的快速响应机制需制度化。</li>
          <li><strong>数据孤岛问题：</strong>个案信息、随访记录、危机档案尚未完全打通，数据利用率有待提升。</li>
        </ul>
        <p>主要原因包括：心理健康服务资源区域分布不均；家长对儿童心理问题识别能力有限；学校心理教育投入历史欠账较多；以及社会对心理咨询的污名化认知仍普遍存在。</p>
      </div>

      <div class="report-section">
        <div class="report-section-title">四、对策建议</div>
        <p>结合实际工作，提出以下参政议政建议：</p>
        <ul>
          <li><strong>1. 加大儿童心理健康服务财政投入。</strong>建议将儿童心理援助热线（400-161-6985）纳入政府购买服务目录，按年拨付专项运营经费，保障热线24小时运转和咨询师值班补贴。</li>
          <li><strong>2. 推动学校心理健康教育标准化建设。</strong>建议济南市教育局出台学校心理教师配置标准（1:500师生比），将心理健康课程纳入中小学必修课，每学期开展全员心理健康筛查，建立"筛查—预警—转介"三级网络。</li>
          <li><strong>3. 建立社区—家庭—学校联动机制。</strong>依托社区卫生服务中心设立儿童心理服务站点，定期开展家长心理健康教育公益讲座，搭建社区心理志愿者队伍，降低家庭参与门槛。</li>
          <li><strong>4. 加强儿童心理危机干预体系建设。</strong>建议参照"心理危机干预绿色通道"模式，建立卫生健康、教育、民政、公安等多部门联动机制，明确转介流程和责任主体，确保危机个案"发现即响应"。</li>
          <li><strong>5. 推动心理健康服务人才队伍建设。</strong>建议将儿童心理咨询师纳入紧缺人才目录，在职称评定、科研项目、继续教育培训等方面给予政策倾斜，吸引更多专业人才投身儿童心理健康事业。</li>
          <li><strong>6. 开展专项调查研究。</strong>建议农工党济南市委以"济南市儿童心理健康状况"为课题开展专项调研，形成年度调研报告，为党委政府决策提供参考依据。</li>
        </ul>
      </div>

      <div class="report-section">
        <div class="report-section-title">五、下一步计划</div>
        <ul>
          <li>持续运营心理援助热线，扩大宣传覆盖面，目标下季度接听量增长20%。</li>
          <li>深化与3-5所试点学校的合作，完善心理健康筛查工具和预警机制。</li>
          <li>开展2期志愿者培训，新增持证心理援助志愿者15名。</li>
          <li>完善个案管理系统，实现随访计划自动提醒和危机预警触发。</li>
          <li>配合农工党济南市委完成专项调研报告初稿撰写。</li>
        </ul>
      </div>

      <div style="margin-top:40px; padding-top:20px; border-top:1px solid var(--gray-200); font-size:12px; color:var(--gray-500); text-align:center;">
        童心惠民项目组 | 生成时间：${reportDate} | 本报告数据已去标识化处理，仅供内部参政议政参考
      </div>
    `;

    document.getElementById('reportInner').innerHTML = reportHTML;
    document.getElementById('loadingOverlay').style.display = 'none';

  } catch (e) {
    document.getElementById('loadingOverlay').style.display = 'none';
    alert('生成报告失败：' + e.message);
  }
}

function logout() { sessionStorage.removeItem('admin_logged_in'); window.location.href = 'index.html'; }
</script>
</body>
</html>
