<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>预约管理 · 童心惠民</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <span class="topbar-logo">🌈</span>
    <span class="topbar-title">童心惠民</span>
    <nav class="topbar-nav">
      <a href="dashboard.html" class="nav-link">📊 数据看板</a>
      <a href="bookings.html" class="nav-link active">📋 预约管理</a>
      <a href="cases.html" class="nav-link">🗂 个案登记</a>
      <a href="crisis.html" class="nav-link">🚨 危机干预</a>
    </nav>
  </div>
  <div class="topbar-right">
    <span class="topbar-user">管理员</span>
    <button class="logout-btn" onclick="logout()">退出</button>
  </div>
</header>

<main class="page-wrapper">
  <div class="page-title">📋 预约管理</div>

  <!-- 紧急预警 -->
  <div id="crisisAlert" class="crisis-alert hidden">
    <span class="crisis-alert-icon">🚨</span>
    <div class="crisis-alert-text">
      <strong>发现紧急预约！</strong>
      以下预约包含敏感关键词，请立即处理。
    </div>
  </div>

  <div class="table-card">
    <div class="table-toolbar">
      <h3>预约列表</h3>
      <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
        <select class="form-select" id="filterStatus" onchange="loadBookings()">
          <option value="">全部状态</option>
          <option value="pending">待确认</option>
          <option value="confirmed">已确认</option>
          <option value="completed">已完成</option>
          <option value="cancelled">已取消</option>
        </select>
        <select class="form-select" id="filterSource" onchange="loadBookings()">
          <option value="">全部来源</option>
          <option value="网站">网站</option>
          <option value="热线">热线</option>
          <option value="学校">学校</option>
          <option value="社区">社区</option>
        </select>
        <button class="btn btn-primary" onclick="openAddModal()">+ 新增预约</button>
      </div>
    </div>

    <div id="bookingsTable">
      <div class="loading-mask"><div class="spinner"></div>加载中...</div>
    </div>
  </div>
</main>

<!-- 更新状态模态框 -->
<div class="modal-overlay" id="statusModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">更新预约状态</div>
      <button class="modal-close" onclick="closeModal('statusModal')">×</button>
    </div>
    <div style="margin-bottom:16px;">
      <p id="statusModalInfo" style="font-size:14px; color:var(--gray-700); margin-bottom:16px;"></p>
      <div class="form-group">
        <label class="form-label">选择新状态</label>
        <select class="form-select" id="newStatus" style="width:100%;">
          <option value="pending">待确认</option>
          <option value="confirmed">已确认</option>
          <option value="completed">已完成</option>
          <option value="cancelled">已取消</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('statusModal')">取消</button>
      <button class="btn btn-primary" onclick="submitStatusUpdate()">确认更新</button>
    </div>
  </div>
</div>

<!-- 新增预约模态框 -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">新增预约</div>
      <button class="modal-close" onclick="closeModal('addModal')">×</button>
    </div>
    <form id="addBookingForm">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">监护人姓名 <span style="color:var(--danger)">*</span></label>
          <input type="text" class="form-input" name="guardian_name" required>
        </div>
        <div class="form-group">
          <label class="form-label">监护人电话 <span style="color:var(--danger)">*</span></label>
          <input type="tel" class="form-input" name="guardian_phone" placeholder="11位手机号" required maxlength="11">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">孩子姓名 <span style="color:var(--danger)">*</span></label>
          <input type="text" class="form-input" name="child_name" required>
        </div>
        <div class="form-group">
          <label class="form-label">孩子年龄 <span style="color:var(--danger)">*</span></label>
          <input type="number" class="form-input" name="child_age" min="1" max="18" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">孩子性别</label>
          <select class="form-input" name="child_gender">
            <option value="">未选择</option>
            <option value="男">男</option>
            <option value="女">女</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">来源渠道</label>
          <select class="form-input" name="source">
            <option value="网站">网站</option>
            <option value="热线">热线</option>
            <option value="学校">学校</option>
            <option value="社区">社区</option>
          </select>
        </div>
      </div>
      <div class="form-group full">
        <label class="form-label">问题类型</label>
        <input type="text" class="form-input" name="issue_type" placeholder="如：焦虑、抑郁、ADHD">
      </div>
      <div class="form-group full">
        <label class="form-label">问题描述</label>
        <textarea class="form-textarea" name="issue_desc" rows="3" placeholder="请详细描述孩子的情况..."></textarea>
      </div>
      <div class="form-group full">
        <label class="form-label">预约日期</label>
        <input type="date" class="form-input" name="preferred_date">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline" onclick="closeModal('addModal')">取消</button>
        <button type="submit" class="btn btn-primary">提交预约</button>
      </div>
    </form>
  </div>
</div>

<script src="js/api.js"></script>
<script>
if (!checkAuth()) {}

const CRISIS_KEYWORDS = ['自伤', '自杀', '想死', '割腕', '不想活', '跳楼', '吃药', '上吊', '虐待', '性侵', '被打', '被烫', '被关', '想杀人', '想报复'];
let currentBookings = [];
let pendingUpdateId = null;

document.addEventListener('DOMContentLoaded', loadBookings);

async function loadBookings() {
  const status = document.getElementById('filterStatus').value;
  const source = document.getElementById('filterSource').value;
  const container = document.getElementById('bookingsTable');

  container.innerHTML = '<div class="loading-mask"><div class="spinner"></div>加载中...</div>';

  try {
    let path = '/admin/bookings';
    const params = [];
    if (status) params.push(`status=${status}`);
    if (source) params.push(`source=${source}`);
    if (params.length) path += '?' + params.join('&');

    const res = await apiGet(path);
    currentBookings = res.data || [];
    renderBookings(currentBookings);
    checkCrisisAlerts(currentBookings);
  } catch (err) {
    container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">❌</div><div class="empty-state-text">加载失败：${err.message}</div></div>`;
  }
}

function checkCrisisAlerts(bookings) {
  const hasCrisis = bookings.some(b =>
    CRISIS_KEYWORDS.some(k => (b.issue_desc || '').includes(k) || (b.issue_type || '').includes(k))
  );
  document.getElementById('crisisAlert').classList.toggle('hidden', !hasCrisis);
}

function renderBookings(bookings) {
  const container = document.getElementById('bookingsTable');

  if (!bookings.length) {
    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-text">暂无预约数据</div></div>';
    return;
  }

  const statusMap = { pending: '待确认', confirmed: '已确认', completed: '已完成', cancelled: '已取消' };
  const badgeClass = { pending: 'badge-pending', confirmed: 'badge-confirmed', completed: 'badge-completed', cancelled: 'badge-cancelled' };

  let html = `<table>
    <thead>
      <tr>
        <th>#</th>
        <th>监护人</th>
        <th>电话</th>
        <th>孩子</th>
        <th>年龄</th>
        <th>问题类型</th>
        <th>来源</th>
        <th>预约日期</th>
        <th>状态</th>
        <th>登记时间</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody>`;

  bookings.forEach((b, i) => {
    const isCrisis = CRISIS_KEYWORDS.some(k => (b.issue_desc || '').includes(k) || (b.issue_type || '').includes(k));
    const rowClass = isCrisis ? 'row-urgent' : '';
    const phone = b.guardian_phone ? '****' + b.guardian_phone.slice(-4) : '-';
    const crisisIcon = isCrisis ? ' 🚨' : '';

    html += `<tr class="${rowClass}">
      <td>${i + 1}</td>
      <td>${e(b.guardian_name)}${crisisIcon}</td>
      <td class="text-muted">${phone}</td>
      <td>${e(b.child_name)}</td>
      <td>${b.child_age || '-'}岁</td>
      <td>${e(b.issue_type || '-')}</td>
      <td>${e(b.source || '网站')}</td>
      <td>${b.preferred_date || '-'}</td>
      <td><span class="badge ${badgeClass[b.status] || 'badge-pending'}">${statusMap[b.status] || '待确认'}</span></td>
      <td class="text-muted" style="font-size:12px;">${formatDate(b.created_at)}</td>
      <td>
        <button class="btn btn-sm btn-outline" onclick="openStatusModal(${b.id}, '${e(b.guardian_name)}', '${b.status}')">改状态</button>
      </td>
    </tr>`;
  });

  html += '</tbody></table>';
  container.innerHTML = html;
}

function openStatusModal(id, name, currentStatus) {
  pendingUpdateId = id;
  document.getElementById('statusModalInfo').textContent = `为「${name}」更新预约状态`;
  document.getElementById('newStatus').value = currentStatus;
  document.getElementById('statusModal').classList.add('show');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
  pendingUpdateId = null;
}

async function submitStatusUpdate() {
  if (!pendingUpdateId) return;
  const status = document.getElementById('newStatus').value;

  try {
    await apiPatch(`/admin/bookings/${pendingUpdateId}`, { status });
    closeModal('statusModal');
    showToast('状态已更新', 'success');
    loadBookings();
  } catch (err) {
    showToast('更新失败：' + err.message, 'error');
  }
}

function openAddModal() {
  document.getElementById('addBookingForm').reset();
  document.getElementById('addModal').classList.add('show');
}

document.getElementById('addBookingForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const form = new FormData(this);
  const data = Object.fromEntries(form.entries());

  try {
    await apiPost('/admin/bookings', data);
    closeModal('addModal');
    showToast('预约创建成功', 'success');
    loadBookings();
  } catch (err) {
    showToast('创建失败：' + err.message, 'error');
  }
});

function e(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function logout() {
  sessionStorage.removeItem('admin_logged_in');
  window.location.href = 'index.html';
}
</script>
</body>
</html>
