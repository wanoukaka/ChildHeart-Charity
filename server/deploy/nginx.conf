# ChildHeart Charity - Nginx 配置
# 部署路径：/etc/nginx/sites-available/childheart.conf

server {
    listen 80;
    server_name childheart.cn www.childheart.cn;
    
    # 前端静态文件
    root /var/www/childheart;
    index index.html;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # 前端路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API 反向代理（端口3002）
    location /api/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 禁止访问敏感目录
    location ~ /\. {
        deny all;
    }

    # 日志
    access_log /var/log/nginx/childheart_access.log;
    error_log /var/log/nginx/childheart_error.log;
}
